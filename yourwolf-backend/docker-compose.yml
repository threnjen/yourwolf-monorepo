services:
  db:
    image: postgres:16
    container_name: yourwolf-db
    environment:
      POSTGRES_USER: yourwolf
      POSTGRES_PASSWORD: yourwolf_dev
      POSTGRES_DB: yourwolf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourwolf -d yourwolf"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yourwolf-backend
    environment:
      - DATABASE_URL=postgresql://yourwolf:yourwolf_dev@db:5432/yourwolf
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && 
             python -m app.seed && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ../yourwolf-frontend
      dockerfile: Dockerfile
    container_name: yourwolf-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../yourwolf-frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
